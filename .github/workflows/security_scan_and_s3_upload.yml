name: security-scan-and-s3-upload

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

permissions:
  id-token: write
  contents: read

jobs:
  security-pipeline:
    runs-on: ubuntu-latest
    environment: prod
    env:
      AWS_REGION: ${{ secrets.AWS_REGION }}
      S3_BUCKET: ${{ secrets.AWS_S3_REPORT_BUCKET }}
      HUB_URL: ${{ secrets.DEVSECOPS_HUB_URL }}
      PROJECT_NAME: ${{ secrets.DEVSECOPS_PROJECT_NAME }}
      PROJECT_TOKEN: ${{ secrets.DEVSECOPS_PROJECT_TOKEN }}
      DAST_TARGET_URL: ${{ secrets.DEVSECOPS_HUB_URL }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_GITHUB_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION }}
          audience: sts.amazonaws.com

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install scanners
        run: pip install semgrep pip-audit

      - name: Run Semgrep
        run: semgrep scan --config auto --json --output semgrep_report.json . || true

      - name: Run pip-audit
        run: |
          if [ -f "requirements.txt" ]; then
            pip-audit -r requirements.txt --format json > pip_audit_report.json || true
          elif [ -f "secure-app/requirements.txt" ]; then
            pip-audit -r secure-app/requirements.txt --format json > pip_audit_report.json || true
          else
            echo '{"dependencies":[],"vulnerabilities":[]}' > pip_audit_report.json
          fi
          
      - name: Wait for Target to be Ready
        run: |
          for i in {1..18}; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" ${{ env.DAST_TARGET_URL }}/healthz || echo "failed")
            if [ "$STATUS" -eq 200 ]; then
              exit 0
            fi
            sleep 10
          done
          exit 1

      - name: ZAP DAST Scan (Manual Run)
        run: |
          chmod -R 777 .
          docker run --rm -v $(pwd):/zap/wrk/:rw --network=host -t ghcr.io/zaproxy/zaproxy:stable zap-baseline.py \
            -t ${{ env.DAST_TARGET_URL }} \
            -J report_json.json \
            -z "-config connection.timeoutInSecs=60" || true

      - name: Upload reports to S3
        id: upload
        run: |
          RUN_ID="${{ github.run_id }}"
          SAST_KEY="reports/${PROJECT_NAME}/sast/${RUN_ID}/semgrep.json"
          SCA_KEY="reports/${PROJECT_NAME}/sca/${RUN_ID}/pip-audit.json"
          DAST_KEY="reports/${PROJECT_NAME}/dast/${RUN_ID}/zap_report.json"
          
          aws s3 cp semgrep_report.json "s3://${S3_BUCKET}/${SAST_KEY}"
          aws s3 cp pip_audit_report.json "s3://${S3_BUCKET}/${SCA_KEY}"
          
          if [ -f "report_json.json" ]; then
            aws s3 cp report_json.json "s3://${S3_BUCKET}/${DAST_KEY}"
          fi

          echo "sast_key=${SAST_KEY}" >> "$GITHUB_OUTPUT"
          echo "sca_key=${SCA_KEY}" >> "$GITHUB_OUTPUT"
          echo "dast_key=${DAST_KEY}" >> "$GITHUB_OUTPUT"

      - name: Ingest Semgrep to Hub
        run: |
          python - <<'PY'
          import json
          import os
          import urllib.request

          with open("semgrep_report.json", "r", encoding="utf-8") as f:
              report = json.load(f)

          payload = {
              "project_name": os.environ["PROJECT_NAME"],
              "tool_type": "sast",
              "report": report,
              "initiated_by": "github-actions",
              "branch": os.environ.get("GITHUB_REF_NAME"),
              "commit_sha": os.environ.get("GITHUB_SHA"),
              "pipeline_run_id": os.environ.get("GITHUB_RUN_ID"),
              "s3_report_path": f"s3://{os.environ['S3_BUCKET']}/{os.environ['SAST_KEY']}",
          }

          req = urllib.request.Request(
              url=f"{os.environ['HUB_URL']}/api/ingest",
              data=json.dumps(payload).encode("utf-8"),
              headers={
                  "Content-Type": "application/json",
                  "X-Project-Token": os.environ["PROJECT_TOKEN"],
              },
              method="POST",
          )

          with urllib.request.urlopen(req) as resp:
              print(resp.read().decode())
          PY
        env:
          SAST_KEY: ${{ steps.upload.outputs.sast_key }}

      - name: Ingest pip-audit to Hub
        run: |
          python - <<'PY'
          import json
          import os
          import urllib.request

          with open("pip_audit_report.json", "r", encoding="utf-8") as f:
              report = json.load(f)

          payload = {
              "project_name": os.environ["PROJECT_NAME"],
              "tool_type": "sca",
              "report": report,
              "initiated_by": "github-actions",
              "branch": os.environ.get("GITHUB_REF_NAME"),
              "commit_sha": os.environ.get("GITHUB_SHA"),
              "pipeline_run_id": os.environ.get("GITHUB_RUN_ID"),
              "s3_report_path": f"s3://{os.environ['S3_BUCKET']}/{os.environ['SCA_KEY']}",
          }

          req = urllib.request.Request(
              url=f"{os.environ['HUB_URL']}/api/ingest",
              data=json.dumps(payload).encode("utf-8"),
              headers={
                  "Content-Type": "application/json",
                  "X-Project-Token": os.environ["PROJECT_TOKEN"],
              },
              method="POST",
          )

          with urllib.request.urlopen(req) as resp:
              print(resp.read().decode())
          PY
        env:
          SCA_KEY: ${{ steps.upload.outputs.sca_key }}

      - name: Ingest ZAP to Hub
        if: always()
        run: |
          if [ -f "report_json.json" ]; then
            python - <<'PY'
            import json
            import os
            import urllib.request

            with open("report_json.json", "r", encoding="utf-8") as f:
                report = json.load(f)

            payload = {
                "project_name": os.environ["PROJECT_NAME"],
                "tool_type": "dast",
                "report": report,
                "initiated_by": "github-actions",
                "branch": os.environ.get("GITHUB_REF_NAME"),
                "commit_sha": os.environ.get("GITHUB_SHA"),
                "pipeline_run_id": os.environ.get("GITHUB_RUN_ID"),
                "s3_report_path": f"s3://{os.environ['S3_BUCKET']}/{os.environ['DAST_KEY']}",
            }

            req = urllib.request.Request(
                url=f"{os.environ['HUB_URL']}/api/ingest",
                data=json.dumps(payload).encode("utf-8"),
                headers={
                    "Content-Type": "application/json",
                    "X-Project-Token": os.environ["PROJECT_TOKEN"],
                },
                method="POST",
            )

            with urllib.request.urlopen(req) as resp:
                print(resp.read().decode())
            PY
          fi
        env:
          DAST_KEY: ${{ steps.upload.outputs.dast_key }}