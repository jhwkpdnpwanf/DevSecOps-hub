name: security-scan-and-s3-upload

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

permissions:
  id-token: write
  contents: read
  actions: write
  checks: write

jobs:
  security-pipeline:
    runs-on: ubuntu-latest
    env:
      AWS_REGION: ${{ secrets.AWS_REGION }}
      S3_BUCKET: ${{ secrets.AWS_S3_REPORT_BUCKET }}
      HUB_URL: ${{ secrets.DEVSECOPS_HUB_URL }}
      PROJECT_NAME: ${{ secrets.DEVSECOPS_PROJECT_NAME }}
      PROJECT_TOKEN: ${{ secrets.DEVSECOPS_PROJECT_TOKEN }}
      DAST_TARGET_URL: ${{ secrets.DEVSECOPS_HUB_URL }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_GITHUB_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION }}
          audience: sts.amazonaws.com

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install scanners
        run: pip install semgrep pip-audit

      - name: Run Semgrep
        run: semgrep scan --config auto --json --output semgrep_report.json . || true

      - name: Run pip-audit
        run: pip-audit -r requirements.txt --format json > pip_audit_report.json || true

      - name: Wait for Target to be Ready
        run: |
          for i in {1..18}; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" ${{ env.DAST_TARGET_URL }}/healthz || echo "failed")
            if [ "$STATUS" -eq 200 ]; then
              exit 0
            fi
            sleep 10
          done
          exit 1

      - name: Prepare ZAP workspace
        run: sudo chmod -R 777 .

      - name: ZAP Baseline Scan
        uses: zaproxy/action-baseline@v0.12.0
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          target: ${{ env.DAST_TARGET_URL }}
          artifact_name: 'zapreport' 
          fail_action: false
          allow_issue_writing: false
          cmd_options: '-z -config connection.timeoutInSecs=60'

      - name: Upload reports to S3
        id: upload
        run: |
          RUN_ID="${{ github.run_id }}"
          SAST_KEY="reports/${PROJECT_NAME}/sast/${RUN_ID}/semgrep.json"
          SCA_KEY="reports/${PROJECT_NAME}/sca/${RUN_ID}/pip-audit.json"
          DAST_KEY="reports/${PROJECT_NAME}/dast/${RUN_ID}/zap_report.json"

          aws s3 cp semgrep_report.json "s3://${S3_BUCKET}/${SAST_KEY}"
          aws s3 cp pip_audit_report.json "s3://${S3_BUCKET}/${SCA_KEY}"
          
          if [ -f "report_json.json" ]; then
            aws s3 cp report_json.json "s3://${S3_BUCKET}/${DAST_KEY}"
          else
            echo "ZAP report not found, but continuing..."
          fi

          echo "sast_key=${SAST_KEY}" >> "$GITHUB_OUTPUT"
          echo "sca_key=${SCA_KEY}" >> "$GITHUB_OUTPUT"
          echo "dast_key=${DAST_KEY}" >> "$GITHUB_OUTPUT"

      - name: Trigger Hub Import
        run: |
          for TOOL in "Semgrep:${{ steps.upload.outputs.sast_key }}" "pip-audit:${{ steps.upload.outputs.sca_key }}" "DAST:${{ steps.upload.outputs.dast_key }}"; do
            IFS=':' read -r TYPE KEY <<< "$TOOL"
            curl -i --fail-with-body -sS -X POST "${HUB_URL}/api/ingest-from-s3" \
              -H "Content-Type: application/json" \
              -H "X-Project-Token: ${PROJECT_TOKEN}" \
              -d "{\"project_name\":\"${PROJECT_NAME}\",\"s3_key\":\"$KEY\",\"tool_type\":\"$TYPE\",\"initiated_by\":\"github-actions\"}"
          done