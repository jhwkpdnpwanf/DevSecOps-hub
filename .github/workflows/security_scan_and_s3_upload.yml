name: security-scan-and-s3-upload

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

permissions:
  id-token: write
  contents: read

jobs:
  security-pipeline:
    runs-on: ubuntu-latest
    env:
      AWS_REGION: ${{ secrets.AWS_REGION }}
      S3_BUCKET: ${{ secrets.AWS_S3_REPORT_BUCKET }}
      HUB_URL: ${{ secrets.DEVSECOPS_HUB_URL }}
      PROJECT_NAME: ${{ secrets.DEVSECOPS_PROJECT_NAME }}
      PROJECT_TOKEN: ${{ secrets.DEVSECOPS_PROJECT_TOKEN }}
      DAST_TARGET_URL: ${{ secrets.DEVSECOPS_HUB_URL }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_GITHUB_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION }}
          audience: sts.amazonaws.com

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install scanners
        run: |
          pip install semgrep pip-audit

      - name: Run Semgrep
        run: |
          semgrep scan --config auto --json --output semgrep_report.json . || true

      - name: Run pip-audit
        run: |
          pip-audit -r requirements.txt --format json > pip_audit_report.json || true

      - name: Upload SAST/SCA reports to S3
        id: upload
        run: |
          RUN_ID="${{ github.run_id }}"
          SAST_KEY="reports/${PROJECT_NAME}/sast/${RUN_ID}/semgrep.json"
          SCA_KEY="reports/${PROJECT_NAME}/sca/${RUN_ID}/pip-audit.json"

          aws s3 cp semgrep_report.json "s3://${S3_BUCKET}/${SAST_KEY}"
          aws s3 cp pip_audit_report.json "s3://${S3_BUCKET}/${SCA_KEY}"

          echo "sast_key=${SAST_KEY}" >> "$GITHUB_OUTPUT"
          echo "sca_key=${SCA_KEY}" >> "$GITHUB_OUTPUT"

      - name: Verify uploaded objects exist
        run: |
          aws s3api head-object --bucket "${S3_BUCKET}" --key "${{ steps.upload.outputs.sast_key }}"
          aws s3api head-object --bucket "${S3_BUCKET}" --key "${{ steps.upload.outputs.sca_key }}"

      - name: Trigger Hub Import (Semgrep)
        run: |
          curl -i --fail-with-body -sS -X POST "${HUB_URL}/api/ingest-from-s3" \
            -H "Content-Type: application/json" \
            -H "X-Project-Token: ${PROJECT_TOKEN}" \
            -d "{\"project_name\":\"${PROJECT_NAME}\",\"s3_key\":\"${{ steps.upload.outputs.sast_key }}\",\"tool_type\":\"Semgrep\",\"initiated_by\":\"github-actions\",\"pipeline_run_id\":\"${{ github.run_id }}\",\"branch\":\"${{ github.ref_name }}\",\"commit_sha\":\"${{ github.sha }}\"}"

      - name: Trigger Hub Import (pip-audit)
        run: |
          curl -i --fail-with-body -sS -X POST "${HUB_URL}/api/ingest-from-s3" \
            -H "Content-Type: application/json" \
            -H "X-Project-Token: ${PROJECT_TOKEN}" \
            -d "{\"project_name\":\"${PROJECT_NAME}\",\"s3_key\":\"${{ steps.upload.outputs.sca_key }}\",\"tool_type\":\"pip-audit\",\"initiated_by\":\"github-actions\",\"pipeline_run_id\":\"${{ github.run_id }}\",\"branch\":\"${{ github.ref_name }}\",\"commit_sha\":\"${{ github.sha }}\"}"

      - name: Trigger Hub DAST run
        if: ${{ env.DAST_TARGET_URL != '' }}
        run: |
          curl -i --fail-with-body -sS -X POST "${HUB_URL}/api/dast/run" \
            -H "Content-Type: application/json" \
            -H "X-Project-Token: ${PROJECT_TOKEN}" \
            -d "{\"project_name\":\"${PROJECT_NAME}\",\"target_url\":\"${DAST_TARGET_URL}\",\"initiated_by\":\"github-actions:dast\",\"pipeline_run_id\":\"${{ github.run_id }}\",\"branch\":\"${{ github.ref_name }}\",\"commit_sha\":\"${{ github.sha }}\"}"
