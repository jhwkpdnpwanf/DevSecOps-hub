name: security-scan-and-s3-upload

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

permissions:
  id-token: write
  contents: read

jobs:
  security-pipeline:
    runs-on: ubuntu-latest
    environment: prod
    env:
      AWS_REGION: ${{ secrets.AWS_REGION }}
      S3_BUCKET: ${{ secrets.AWS_S3_REPORT_BUCKET }}
      HUB_URL: ${{ secrets.DEVSECOPS_HUB_URL }}
      PROJECT_NAME: ${{ secrets.DEVSECOPS_PROJECT_NAME }}
      PROJECT_TOKEN: ${{ secrets.DEVSECOPS_PROJECT_TOKEN }}
      DAST_TARGET_URL: ${{ secrets.DEVSECOPS_HUB_URL }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_GITHUB_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION }}
          audience: sts.amazonaws.com

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install scanners
        run: pip install semgrep pip-audit

      - name: Run Semgrep
        run: semgrep scan --config auto --json --output semgrep_report.json . || true

      - name: Run pip-audit
        run: |
          if [ -f "requirements.txt" ]; then
            pip-audit -r requirements.txt --format json > pip_audit_report.json || true
          elif [ -f "secure-app/requirements.txt" ]; then
            pip-audit -r secure-app/requirements.txt --format json > pip_audit_report.json || true
          else
            echo '{"dependencies":[],"vulnerabilities":[]}' > pip_audit_report.json
          fi

      - name: Wait for Target to be Ready
        run: |
          for i in {1..18}; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" "${DAST_TARGET_URL}/healthz" || echo "failed")
            if [ "$STATUS" = "200" ]; then
              exit 0
            fi
            sleep 10
          done
          echo "Target is not ready"
          exit 1

      - name: ZAP DAST Scan (Manual Run)
        run: |
          chmod -R 777 .
          docker run --rm \
            -v "$(pwd):/zap/wrk/:rw" \
            --network=host \
            -t ghcr.io/zaproxy/zaproxy:stable \
            zap-baseline.py \
            -t "${DAST_TARGET_URL}" \
            -J report_json.json \
            -z "-config connection.timeoutInSecs=60" || true

      - name: Upload reports to S3
        id: upload
        run: |
          RUN_ID="${{ github.run_id }}"
          SAST_KEY="reports/${PROJECT_NAME}/sast/${RUN_ID}/semgrep.json"
          SCA_KEY="reports/${PROJECT_NAME}/sca/${RUN_ID}/pip-audit.json"
          DAST_KEY="reports/${PROJECT_NAME}/dast/${RUN_ID}/zap_report.json"

          aws s3 cp semgrep_report.json "s3://${S3_BUCKET}/${SAST_KEY}"
          aws s3 cp pip_audit_report.json "s3://${S3_BUCKET}/${SCA_KEY}"

          if [ -f "report_json.json" ]; then
            aws s3 cp report_json.json "s3://${S3_BUCKET}/${DAST_KEY}"
          fi

          echo "sast_key=${SAST_KEY}" >> "$GITHUB_OUTPUT"
          echo "sca_key=${SCA_KEY}" >> "$GITHUB_OUTPUT"
          echo "dast_key=${DAST_KEY}" >> "$GITHUB_OUTPUT"

      - name: Build Semgrep ingest payload
        env:
          SAST_KEY: ${{ steps.upload.outputs.sast_key }}
        run: |
          python automation/build_ingest_payload.py sast semgrep_report.json semgrep_ingest.json

      - name: Ingest Semgrep to Hub
        run: |
          python automation/post_ingest.py semgrep_ingest.json

      - name: Build pip-audit ingest payload
        env:
          SCA_KEY: ${{ steps.upload.outputs.sca_key }}
        run: |
          python automation/build_ingest_payload.py sca pip_audit_report.json pip_audit_ingest.json

      - name: Ingest pip-audit to Hub
        run: |
          python automation/post_ingest.py pip_audit_ingest.json

      - name: Build ZAP ingest payload
        if: always()
        env:
          DAST_KEY: ${{ steps.upload.outputs.dast_key }}
        run: |
          if [ ! -f "report_json.json" ]; then
            echo "report_json.json not found, skipping ZAP payload build"
            exit 0
          fi
          python automation/build_ingest_payload.py dast report_json.json zap_ingest.json

      - name: Ingest ZAP to Hub
        if: always()
        run: |
          if [ ! -f "zap_ingest.json" ]; then
            echo "zap_ingest.json not found, skipping ZAP ingest"
            exit 0
          fi
          python automation/post_ingest.py zap_ingest.json