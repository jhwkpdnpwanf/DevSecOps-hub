<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <title>DevSecOps Hub Login</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f3f4f6;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 16px;
    }
    .card {
      background: white;
      border: 1px solid #d1d5db;
      border-radius: 10px;
      padding: 24px;
      width: min(100%, 420px);
      box-shadow: 0 8px 20px rgba(0, 0, 0, 0.08);
    }
    .field-label { display:block; font-size:14px; font-weight:600; color:#1f2937; margin-top:14px; }
    input, button {
      width:100%;
      padding:11px 12px;
      margin-top:8px;
      border:1px solid #9ca3af;
      border-radius:8px;
      font-size:15px;
      background:#ffffff;
      color:#111827;
    }
    input:focus {
      outline:none;
      border-color:#2563eb;
      box-shadow:0 0 0 3px rgba(37, 99, 235, 0.15);
    }
    button {
      margin-top:12px;
      background:#2563eb;
      color:#fff;
      border:none;
      font-weight:600;
      cursor:pointer;
      transition:background 0.15s ease-in-out;
    }
    button:hover { background:#1d4ed8; }
    .secondary {
      background: #111827;
    }
    .secondary:hover { background: #030712; }
    .hint { color:#6b7280; font-size:13px; margin-top:8px; line-height: 1.45; }
  </style>
</head>
<body>
  <div class="card">
    <h2>DevSecOps Hub 로그인</h2>
    {% if github_oauth_enabled %}
      <p class="hint">GitHub OAuth로 로그인합니다.</p>
      <button class="secondary" onclick="window.location.href='/auth/github/login'">GitHub로 로그인</button>
    {% else %}
      <p class="hint">로그인 설정이 비어 있습니다. 관리자에게 GitHub OAuth 설정을 요청하세요.</p>
    {% endif %}
  </div>

<script>
async function login() {
  if (!document.getElementById('email')) return;
  const email = document.getElementById('email').value;
  const resp = await fetch('/auth/mock-login', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ email })
  });
  const data = await resp.json();
  if (resp.ok) {
    window.location.href = '/';
  } else {
    document.getElementById('msg').textContent = data.detail || '로그인 실패';
  }
}
</script>
</body>
</html>
